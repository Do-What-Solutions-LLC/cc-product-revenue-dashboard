name: Refresh Product Revenue Data

on:
  schedule:
    # Runs daily at 6:00 AM UTC (midnight MST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests requests-oauthlib

      - name: Run data refresh
        env:
          NETSUITE_ACCOUNT_ID: ${{ secrets.NETSUITE_ACCOUNT_ID }}
          NETSUITE_CONSUMER_KEY: ${{ secrets.NETSUITE_CONSUMER_KEY }}
          NETSUITE_CONSUMER_SECRET: ${{ secrets.NETSUITE_CONSUMER_SECRET }}
          NETSUITE_TOKEN_ID: ${{ secrets.NETSUITE_TOKEN_ID }}
          NETSUITE_TOKEN_SECRET: ${{ secrets.NETSUITE_TOKEN_SECRET }}
        run: python refresh_product_data.py

      - name: Embed data into dashboard HTML
        run: |
          python -c "
          import json
          with open('product_revenue_all.json') as f:
              data = f.read().strip()
          with open('Product_Revenue_Dashboard.html') as f:
              html = f.read()
          # Replace the embedded data script content
          import re
          html = re.sub(
              r'(<script id=\"embedded-data\" type=\"application/json\">).*?(</script>)',
              r'\1' + data + r'\2',
              html,
              flags=re.DOTALL
          )
          with open('Product_Revenue_Dashboard.html', 'w') as f:
              f.write(html)
          print(f'Embedded {len(data)} bytes of data into HTML')
          "

      - name: Commit and push updated data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add product_revenue_all.json Product_Revenue_Dashboard.html
          git diff --staged --quiet || git commit -m "Auto-refresh product revenue data $(date +'%Y-%m-%d %H:%M')"
          git push
